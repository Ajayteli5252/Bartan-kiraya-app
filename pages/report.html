<!-- report.html — Print Ready Report -->

<!-- Filter Card -->
<div class="card no-print">
  <div class="card-title">Report Filter</div>
  <div class="form-group">
    <label class="form-label">Year</label>
    <select class="form-control" id="report-year" onchange="loadReport()">
      <!-- Filled by JS -->
    </select>
  </div>
  <div class="form-group" style="margin-bottom:0;">
    <label class="form-label">Month (Optional)</label>
    <select class="form-control" id="report-month" onchange="loadReport()">
      <option value="">Poora Saal</option>
      <option value="0">January</option>
      <option value="1">February</option>
      <option value="2">March</option>
      <option value="3">April</option>
      <option value="4">May</option>
      <option value="5">June</option>
      <option value="6">July</option>
      <option value="7">August</option>
      <option value="8">September</option>
      <option value="9">October</option>
      <option value="10">November</option>
      <option value="11">December</option>
    </select>
  </div>
</div>

<!-- Report Output -->
<div id="report-output"></div>

<!-- Print Button -->
<div class="btn-row no-print" style="margin-bottom:16px;">
  <button class="btn btn-outline" onclick="window.print()">🖨️ Print Report</button>
</div>
